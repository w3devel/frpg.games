<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRPG.games</title>
  <style>
    body {
      width: 320px;
      min-height: 200px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
    }
    header {
      background: #16213e;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #2a2a4a;
    }
    .logo { font-size: 20px; color: #f5a623; font-weight: 700; }
    .title { font-size: 13px; color: #9090a0; }
    main { padding: 14px 16px; }
    button {
      width: 100%;
      margin-bottom: 8px;
      padding: 8px 12px;
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #2a2a4a;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
    }
    button:hover { background: #e94560; color: #fff; }
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9090a0;
      margin: 10px 0 6px;
    }
    select {
      width: 100%;
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 12px;
      margin-bottom: 8px;
    }
    #status {
      font-size: 11px;
      color: #9090a0;
      margin-top: 8px;
      min-height: 18px;
    }
    footer {
      padding: 8px 16px;
      border-top: 1px solid #2a2a4a;
      font-size: 10px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">⬡</span>
    <div>
      <div style="font-weight:700;font-size:15px">FRPG.games</div>
      <div class="title">VTT Asset Creator</div>
    </div>
  </header>
  <main>
    <button id="btn-editor">🎨 Open Asset Editor</button>

    <div class="section-title">Game System</div>
    <select id="sel-system">
      <option value="srd521">D&amp;D SRD 5.2.1 (CC BY 4.0)</option>
      <option value="pathfinder2e">Pathfinder 2e (ORC)</option>
      <option value="blackflag">Black Flag RPG (CC BY 4.0)</option>
    </select>

    <div class="section-title">Actions</div>
    <button id="btn-save">💾 Save Current Asset</button>
    <button id="btn-load">📂 Load Assets</button>
    <button id="btn-settings">⚙ Settings</button>

    <div id="status">Loading…</div>
  </main>
  <footer>
    <a href="https://frpg.games" target="_blank" style="color:#555;text-decoration:none">frpg.games</a>
    · v0.1.0
  </footer>
  <script src="popup.js" type="module"></script>
</body>
</html>
